<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1:1 문의 VOC 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f6fa;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ─── Header ─── */
  header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 28px 40px;
    box-shadow: 0 4px 20px rgba(102,126,234,0.3);
  }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  header p  { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .header-btns { display: flex; align-items: center; gap: 10px; }

  .refresh-btn {
    background: rgba(255,255,255,0.2);
    border: 1.5px solid rgba(255,255,255,0.5);
    color: white;
    border-radius: 20px;
    padding: 7px 18px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.3); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .refresh-icon { display: inline-block; }
  .refresh-btn.spinning .refresh-icon { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .plan-toggle-btn {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.4);
    color: white;
    border-radius: 20px;
    padding: 7px 18px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .plan-toggle-btn:hover { background: rgba(255,255,255,0.28); }
  .plan-toggle-btn.active {
    background: white;
    color: #764ba2;
    font-weight: 700;
    border-color: white;
  }

  /* ─── Loading / Error overlay ─── */
  .status-bar {
    display: none;
    align-items: center;
    gap: 10px;
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    color: #795548;
    margin-bottom: 20px;
  }
  .status-bar.error { background: #ffebee; border-color: #ef9a9a; color: #c62828; }
  .status-bar.visible { display: flex; }

  /* ─── Main layout ─── */
  main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  /* ─── Summary Cards ─── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .summary-card {
    background: white;
    border-radius: 16px;
    padding: 24px 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-top: 4px solid transparent;
    transition: transform 0.15s;
  }
  .summary-card:hover { transform: translateY(-2px); }
  .summary-card.total    { border-top-color: #667eea; }
  .summary-card.customer { border-top-color: #43b97f; }
  .summary-card.seller   { border-top-color: #f7931e; }

  .card-label { font-size: 13px; color: #888; font-weight: 500; }
  .card-value { font-size: 42px; font-weight: 800; line-height: 1; }
  .total    .card-value { color: #667eea; }
  .customer .card-value { color: #43b97f; }
  .seller   .card-value { color: #f7931e; }
  .card-sub { font-size: 12px; color: #aaa; }

  /* ─── Filter bar ─── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-bar span { font-size: 13px; color: #666; font-weight: 500; }
  .filter-btn {
    background: white;
    border: 1.5px solid #e0e0e0;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    color: #555;
    transition: all 0.15s;
    font-family: inherit;
  }
  .filter-btn:hover { border-color: #667eea; color: #667eea; }
  .filter-btn.active {
    background: #667eea;
    border-color: #667eea;
    color: white;
    font-weight: 600;
  }
  /* 전체 버튼은 별도 스타일 없음 — 동일하게 처리 */

  /* ─── Two column layout ─── */
  .content-grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 20px;
    align-items: start;
  }

  /* ─── Type chart panel ─── */
  .panel {
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .panel-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
    font-weight: 700;
    color: #333;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-header .badge {
    background: #f0f0f0;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    color: #888;
    font-weight: 500;
  }

  /* ─── Type rows ─── */
  .type-list { padding: 10px 0; }
  .type-row {
    padding: 10px 22px;
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 3px solid transparent;
  }
  .type-row:hover { background: #f7f8ff; }
  .type-row.active {
    background: #f0f3ff;
    border-left-color: #667eea;
  }

  .type-bar-wrap { flex: 1; }
  .type-name {
    font-size: 12.5px;
    color: #444;
    font-weight: 500;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 230px;
  }
  .type-row.active .type-name { color: #667eea; font-weight: 600; }

  .bar-track {
    background: #f0f0f0;
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #667eea, #9b59b6);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .type-count {
    font-size: 18px;
    font-weight: 800;
    color: #667eea;
    min-width: 26px;
    text-align: right;
  }

  /* ─── VOC list panel ─── */
  .voc-header-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px 14px;
    border-bottom: 1px solid #f0f0f0;
  }
  .voc-title { font-size: 14px; font-weight: 700; color: #333; }
  .voc-count-badge {
    background: #667eea;
    color: white;
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    font-weight: 600;
  }

  .voc-list { padding: 8px 0; max-height: 600px; overflow-y: auto; }
  .voc-item {
    padding: 14px 22px;
    border-bottom: 1px solid #f7f7f7;
    cursor: pointer;
    transition: background 0.1s;
  }
  .voc-item:last-child { border-bottom: none; }
  .voc-item:hover { background: #f9f9ff; }

  .voc-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    border-radius: 4px;
    padding: 2px 8px;
    font-weight: 600;
  }
  .tag-gubun-customer { background: #e8f8f0; color: #2e9e6b; }
  .tag-gubun-seller   { background: #fff3e0; color: #d0760c; }
  .tag-date { background: #f0f0f0; color: #777; }
  .tag-num  { color: #aaa; font-size: 11px; }

  .voc-content {
    font-size: 13px;
    color: #444;
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .voc-item.expanded .voc-content {
    display: block;
    -webkit-line-clamp: unset;
  }

  /* ─── Empty state ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #bbb;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ─── Scrollbar ─── */
  .voc-list::-webkit-scrollbar { width: 4px; }
  .voc-list::-webkit-scrollbar-track { background: #f5f5f5; }
  .voc-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  @media (max-width: 768px) {
    .summary-grid { grid-template-columns: 1fr; }
    .content-grid { grid-template-columns: 1fr; }
    header { padding: 20px 16px; }
    main { padding: 20px 14px; }
  }

  /* ═══════════════════════════════════════
     향후 대응 방향 — 모달 레이어
  ═══════════════════════════════════════ */

  .plan-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 12, 30, 0.55);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    animation: fadeIn 0.18s ease;
  }
  .plan-overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .plan-modal {
    background: white;
    border-radius: 20px;
    width: 100%;
    max-width: 1020px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 60px rgba(0,0,0,0.22);
    animation: slideUp 0.22s cubic-bezier(0.34,1.26,0.64,1);
    overflow: hidden;
  }
  @keyframes slideUp {
    from { transform: translateY(28px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .plan-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px 16px;
    border-bottom: 1px solid #f0f0f0;
    flex-shrink: 0;
  }
  .plan-modal-title-wrap { display: flex; align-items: center; gap: 12px; }
  .plan-modal-title { font-size: 16px; font-weight: 800; color: #1a1a2e; }
  .plan-count-badge {
    background: #764ba2;
    color: white;
    border-radius: 20px;
    padding: 3px 13px;
    font-size: 12px;
    font-weight: 600;
  }

  .plan-close-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: #f0f0f0;
    color: #666;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .plan-close-btn:hover { background: #e0e0e0; color: #333; }

  .plan-status-bar {
    display: flex;
    gap: 8px;
    padding: 14px 28px;
    border-bottom: 1px solid #f5f5f5;
    flex-wrap: wrap;
    flex-shrink: 0;
    background: white;
  }
  .plan-status-btn {
    border-radius: 16px;
    padding: 5px 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid transparent;
    font-family: inherit;
    transition: all 0.12s;
  }
  .plan-status-btn.all    { background: #f0ebff; color: #764ba2; border-color: #d5c8f0; }
  .plan-status-btn.deploy { background: #e8f8f0; color: #1d8a56; border-color: #b8e8d0; }
  .plan-status-btn.review { background: #fff8e1; color: #b07a00; border-color: #f0d88a; }
  .plan-status-btn.hold   { background: #f0f0f0; color: #888;    border-color: #ddd; }
  .plan-status-btn.active { box-shadow: 0 2px 8px rgba(0,0,0,0.12); transform: translateY(-1px); }
  .plan-status-btn.all.active    { background: #764ba2; color: white; border-color: #764ba2; }
  .plan-status-btn.deploy.active { background: #1d8a56; color: white; border-color: #1d8a56; }
  .plan-status-btn.review.active { background: #b07a00; color: white; border-color: #b07a00; }
  .plan-status-btn.hold.active   { background: #888;    color: white; border-color: #888; }

  .plan-modal-body {
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }
  .plan-modal-body::-webkit-scrollbar { width: 5px; }
  .plan-modal-body::-webkit-scrollbar-track { background: #f8f8f8; }
  .plan-modal-body::-webkit-scrollbar-thumb { background: #d0c8e8; border-radius: 4px; }

  .plan-table-wrap { overflow-x: auto; }
  .plan-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .plan-table thead th {
    background: #faf8ff;
    padding: 12px 18px;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    color: #666;
    border-bottom: 1px solid #eee;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .plan-table tbody tr { border-bottom: 1px solid #f5f5f5; transition: background 0.1s; }
  .plan-table tbody tr:last-child { border-bottom: none; }
  .plan-table tbody tr:hover { background: #fbf9ff; }
  .plan-table tbody td { padding: 13px 18px; vertical-align: top; line-height: 1.55; }
  .plan-table td.cat-cell { font-weight: 600; color: #555; white-space: nowrap; font-size: 12.5px; }
  .plan-table td.improvement-cell { color: #333; }
  .plan-table td.note-cell { color: #888; font-size: 12px; }

  .dev-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 20px;
    padding: 3px 11px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }
  .dev-badge.deployed  { background: #e8f8f0; color: #1d8a56; }
  .dev-badge.reviewing { background: #fff8e1; color: #b07a00; }
  .dev-badge.hold      { background: #f0f0f0; color: #888; }
  .dev-badge.none      { background: #f5f5f5; color: #bbb; }

  .jira-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #0052cc;
    color: white;
    border-radius: 5px;
    padding: 3px 10px;
    font-size: 11.5px;
    font-weight: 700;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .jira-btn:hover { background: #003fa8; }

  .plan-empty {
    text-align: center;
    padding: 60px 20px;
    color: #ccc;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>📊 1:1 문의 VOC 대시보드</h1>
      <p id="header-subtitle">데이터 불러오는 중...</p>
    </div>
    <div class="header-btns">
      <button class="plan-toggle-btn" id="plan-toggle-btn" onclick="openPlan()">🗺️ 향후 대응 방향</button>
      <button class="refresh-btn" id="refresh-btn" onclick="fetchData()">
        <span class="refresh-icon">↻</span> 새로고침
      </button>
    </div>
  </div>
</header>

<!-- ════ 향후 대응 방향 모달 레이어 ════ -->
<div class="plan-overlay" id="plan-overlay" onclick="handleOverlayClick(event)">
  <div class="plan-modal" id="plan-modal">

    <div class="plan-modal-header">
      <div class="plan-modal-title-wrap">
        <div class="plan-modal-title">🗺️ 향후 대응 방향</div>
        <div class="plan-count-badge" id="plan-count-badge">0건</div>
      </div>
      <button class="plan-close-btn" onclick="closePlan()" title="닫기">✕</button>
    </div>

    <div class="plan-status-bar">
      <button class="plan-status-btn all active" onclick="filterPlan('all')">전체</button>
      <button class="plan-status-btn deploy"     onclick="filterPlan('배포')">✅ 배포 완료</button>
      <button class="plan-status-btn review"     onclick="filterPlan('검토')">🔍 검토 중</button>
      <button class="plan-status-btn hold"       onclick="filterPlan('보류')">⏸ 보류</button>
    </div>

    <div class="plan-modal-body">
      <div class="plan-table-wrap">
        <table class="plan-table">
          <thead>
            <tr>
              <th>구분</th>
              <th>개선 내용</th>
              <th>개발 여부</th>
              <th>Jira</th>
              <th>비고</th>
            </tr>
          </thead>
          <tbody id="plan-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>
<!-- ════════════════════════════════════ -->

<main>
  <div class="status-bar" id="status-bar"></div>

  <!-- Summary Cards -->
  <div class="summary-grid" id="voc-summary">
    <div class="summary-card total">
      <div class="card-label">총 문의</div>
      <div class="card-value" id="total-count">—</div>
      <div class="card-sub">전체 VOC 건수</div>
    </div>
    <div class="summary-card customer">
      <div class="card-label">고객 문의</div>
      <div class="card-value" id="customer-count">—</div>
      <div class="card-sub">고객 CALL · CHAT · 메일</div>
    </div>
    <div class="summary-card seller">
      <div class="card-label">판매자 문의</div>
      <div class="card-value" id="seller-count">—</div>
      <div class="card-sub">판매자 CALL · CHAT</div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar" id="voc-filters">
    <span>구분 필터:</span>
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="고객 CALL">고객 CALL</button>
    <button class="filter-btn" data-filter="고객 CHAT">고객 CHAT</button>
    <button class="filter-btn" data-filter="고객 메일">고객 메일</button>
    <button class="filter-btn" data-filter="판매자 CALL">판매자 CALL</button>
    <button class="filter-btn" data-filter="판매자 CHAT">판매자 CHAT</button>
  </div>

  <!-- Main content -->
  <div class="content-grid" id="voc-content">
    <div class="panel">
      <div class="panel-header">
        유형별 문의 건수
        <span class="badge" id="type-badge">전체</span>
      </div>
      <div class="type-list" id="type-list"></div>
    </div>

    <div class="panel">
      <div class="voc-header-info">
        <div class="voc-title" id="voc-panel-title">전체 VOC 목록</div>
        <div class="voc-count-badge" id="voc-panel-count">0건</div>
      </div>
      <div class="voc-list" id="voc-list"></div>
    </div>
  </div>
</main>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxB8rff29BWaZ_IXo1mvjP_u7Oh2plRL2Lzmj3xDqICidw5R8ntXE0fU8-MwwKtWBxucw/exec';

let RAW = [];
let PLAN_DATA = [];
let planFilter = 'all';

// ── 모달 열기 / 닫기 ──
function openPlan() {
  document.getElementById('plan-overlay').classList.add('open');
  document.getElementById('plan-toggle-btn').classList.add('active');
  document.body.style.overflow = 'hidden';
  renderPlanTable();
}
function closePlan() {
  document.getElementById('plan-overlay').classList.remove('open');
  document.getElementById('plan-toggle-btn').classList.remove('active');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('plan-overlay')) closePlan();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlan(); });

// ── 플랜 상태 필터 (단일 선택) ──
function filterPlan(f) {
  planFilter = f;
  document.querySelectorAll('.plan-status-btn').forEach(b => b.classList.remove('active'));
  const map = { all:'all', '배포':'deploy', '검토':'review', '보류':'hold' };
  document.querySelector('.plan-status-btn.' + map[f]).classList.add('active');
  renderPlanTable();
}

// ── Fetch ──
async function fetchData() {
  const btn = document.getElementById('refresh-btn');
  const bar = document.getElementById('status-bar');
  const sub = document.getElementById('header-subtitle');
  btn.disabled = true;
  btn.classList.add('spinning');
  bar.className = 'status-bar visible';
  bar.textContent = '⏳ 스프레드시트에서 최신 데이터를 불러오는 중...';
  try {
    const res = await fetch(API_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const parsed = await res.json();
    if (Array.isArray(parsed)) {
      if (!parsed.length) throw new Error('데이터가 비어있습니다');
      RAW = parsed;
    } else if (parsed && Array.isArray(parsed.voc)) {
      if (!parsed.voc.length) throw new Error('데이터가 비어있습니다');
      RAW = parsed.voc;
      PLAN_DATA = Array.isArray(parsed.plan) ? parsed.plan : [];
    } else {
      throw new Error('응답 형식 오류');
    }
    const now = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
    sub.textContent = '마지막 업데이트: ' + now;
    bar.className = 'status-bar';
    // 필터 초기화
    activeFilters = new Set();
    activeType = null;
    syncFilterButtons();
    render();
    if (document.getElementById('plan-overlay').classList.contains('open')) renderPlanTable();
  } catch (e) {
    bar.className = 'status-bar error visible';
    bar.textContent = '⚠️ 데이터 로드 실패: ' + e.message + ' — 기존 데이터를 표시합니다.';
    render();
  } finally {
    btn.disabled = false;
    btn.classList.remove('spinning');
  }
}

// ══════════════════════════════════════
//  구분 필터 — 복수 선택
//  activeFilters: Set<string>
//  비어있으면 = 전체
// ══════════════════════════════════════
let activeFilters = new Set(); // 비어 있으면 전체
let activeType    = null;

function filteredByGubun() {
  if (activeFilters.size === 0) return RAW;
  return RAW.filter(r => activeFilters.has(r.gubun));
}
function finalFiltered() {
  let d = filteredByGubun();
  if (activeType) d = d.filter(r => r.type === activeType);
  return d;
}
function isCustomer(r) { return r.gubun.startsWith('고객'); }

// 버튼 active 상태 동기화
function syncFilterButtons() {
  const isAll = activeFilters.size === 0;
  document.querySelectorAll('.filter-btn').forEach(b => {
    const f = b.dataset.filter;
    if (f === 'all') {
      b.classList.toggle('active', isAll);
    } else {
      b.classList.toggle('active', activeFilters.has(f));
    }
  });
}

// 필터 버튼 클릭 핸들러
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    if (f === 'all') {
      // 전체: 선택 초기화
      activeFilters = new Set();
    } else {
      // 개별 토글
      if (activeFilters.has(f)) {
        activeFilters.delete(f);
      } else {
        activeFilters.add(f);
      }
    }
    activeType = null;
    syncFilterButtons();
    render();
  });
});

// ── badge/title 텍스트 생성 ──
function filterLabel() {
  if (activeFilters.size === 0) return '전체';
  if (activeFilters.size === 1) return [...activeFilters][0];
  return [...activeFilters].join(' · ');
}

function renderSummary() {
  const base = filteredByGubun();
  document.getElementById('total-count').textContent    = base.length;
  document.getElementById('customer-count').textContent = base.filter(isCustomer).length;
  document.getElementById('seller-count').textContent   = base.filter(r => !isCustomer(r)).length;
}

function renderTypeList() {
  const base = filteredByGubun();
  const counts = {};
  base.forEach(r => { counts[r.type] = (counts[r.type] || 0) + 1; });
  const maxCount = Math.max(...Object.values(counts), 1);
  const types = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  document.getElementById('type-badge').textContent = filterLabel();
  const container = document.getElementById('type-list');
  container.innerHTML = '';
  const allRow = document.createElement('div');
  allRow.className = 'type-row' + (activeType === null ? ' active' : '');
  allRow.innerHTML = '<div class="type-bar-wrap"><div class="type-name">📋 전체 보기</div><div class="bar-track"><div class="bar-fill" style="width:100%"></div></div></div><div class="type-count">' + base.length + '</div>';
  allRow.addEventListener('click', () => { activeType = null; render(); });
  container.appendChild(allRow);
  types.forEach(([type, count]) => {
    const pct = Math.round(count / maxCount * 100);
    const row = document.createElement('div');
    row.className = 'type-row' + (activeType === type ? ' active' : '');
    row.innerHTML = '<div class="type-bar-wrap"><div class="type-name" title="' + type + '">' + type + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div></div><div class="type-count">' + count + '</div>';
    row.addEventListener('click', () => { activeType = (activeType === type ? null : type); render(); });
    container.appendChild(row);
  });
}

function renderVocList() {
  const data = finalFiltered();
  const label = filterLabel();
  const title = activeType ? activeType : (label === '전체' ? '전체 VOC 목록' : label + ' 목록');
  document.getElementById('voc-panel-title').textContent = title;
  document.getElementById('voc-panel-count').textContent = data.length + '건';
  const container = document.getElementById('voc-list');
  container.innerHTML = '';
  if (!data.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>해당하는 VOC가 없습니다</p></div>';
    return;
  }
  data.forEach(r => {
    const tagClass = isCustomer(r) ? 'tag-gubun-customer' : 'tag-gubun-seller';
    const item = document.createElement('div');
    item.className = 'voc-item';
    const cleanVoc = (r.voc || '').replace(/<br\s*\/?>/gi, ' ').replace(/\s+/g, ' ').trim();
    item.innerHTML = '<div class="voc-meta"><span class="tag ' + tagClass + '">' + r.gubun + '</span><span class="tag tag-date">' + r.date + '</span><span class="tag">' + r.type + '</span><span class="tag-num">#' + r.num + '</span></div><div class="voc-content">' + cleanVoc + '</div>';
    item.addEventListener('click', () => item.classList.toggle('expanded'));
    container.appendChild(item);
  });
}

function render() { renderSummary(); renderTypeList(); renderVocList(); }

// ── 향후 대응 방향 렌더 ──
function devBadge(status) {
  if (!status || !status.trim()) return '<span class="dev-badge none">—</span>';
  const s = status.trim();
  if (s.includes('배포')) return '<span class="dev-badge deployed">✅ ' + s + '</span>';
  if (s.includes('검토')) return '<span class="dev-badge reviewing">🔍 ' + s + '</span>';
  if (s.includes('보류')) return '<span class="dev-badge hold">⏸ ' + s + '</span>';
  return '<span class="dev-badge none">' + s + '</span>';
}

function jiraBtn(url) {
  if (!url || !url.trim()) return '<span style="color:#ddd">—</span>';
  const m = url.trim().match(/\/browse\/([A-Z0-9]+-\d+)/i);
  const ticket = m ? m[1].toUpperCase() : url.trim();
  return '<a class="jira-btn" href="' + url.trim() + '" target="_blank" rel="noopener">' + ticket + '</a>';
}

function renderPlanTable() {
  let data = PLAN_DATA;
  if (planFilter === '배포') data = PLAN_DATA.filter(r => r.devStatus && r.devStatus.includes('배포'));
  else if (planFilter === '검토') data = PLAN_DATA.filter(r => r.devStatus && r.devStatus.includes('검토'));
  else if (planFilter === '보류') data = PLAN_DATA.filter(r => r.devStatus && r.devStatus.includes('보류'));

  document.getElementById('plan-count-badge').textContent = data.length + '건';

  const tbody = document.getElementById('plan-tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="plan-empty">' +
      (PLAN_DATA.length === 0
        ? '⏳ 새로고침을 눌러 데이터를 불러와 주세요.'
        : '해당 상태의 항목이 없습니다.') +
      '</td></tr>';
    return;
  }
  tbody.innerHTML = '';
  data.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="cat-cell">'         + (r.category    || '—') + '</td>' +
      '<td class="improvement-cell">' + (r.improvement || '—') + '</td>' +
      '<td>'                          + devBadge(r.devStatus)   + '</td>' +
      '<td>'                          + jiraBtn(r.jiraUrl)      + '</td>' +
      '<td class="note-cell">'        + (r.note         || '—') + '</td>';
    tbody.appendChild(tr);
  });
}

// ── Init ──
syncFilterButtons();
render();
fetchData();
</script>
</body>
</html>
