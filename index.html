// ═══════════════════════════════════════════════
//  CSV PARSER
// ═══════════════════════════════════════════════
function parseCSV(text) {
  const lines = [];
  let inQuote = false, line = [], cell = '';
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { inQuote = !inQuote; }
    else if (c === ',' && !inQuote) { line.push(cell.trim()); cell = ''; }
    else if ((c === '\n' || c === '\r') && !inQuote) {
      if (c === '\r' && text[i+1] === '\n') i++;
      line.push(cell.trim()); lines.push(line); line = []; cell = '';
    } else { cell += c; }
  }
  if (cell || line.length) { line.push(cell.trim()); lines.push(line); }
  return lines;
}

function csvToRecords(text) {
  const rows = parseCSV(text);
  const records = [];
  let lastGubun = '', lastDate = '';
  for (let i = 2; i < rows.length; i++) {
    const r = rows[i];
    if (!r[4]) continue;
    const num = parseInt(r[4]);
    if (isNaN(num)) continue;
    if (r[0] && r[0].trim()) lastGubun = r[0].trim();
    if (r[2] && r[2].trim()) lastDate  = r[2].trim();
    const type = r[3] ? r[3].trim() : '';
    const voc  = r[5] ? r[5].trim() : '';
    if (!type && !voc) continue;
    records.push({ gubun: lastGubun, date: lastDate, type, num, voc });
  }
  return records;
}

// ═══════════════════════════════════════════════
//  FETCH DATA FROM GOOGLE SHEETS
// ═══════════════════════════════════════════════
async function fetchData() {
  const btn  = document.getElementById('refresh-btn');
  const bar  = document.getElementById('status-bar');
  const sub  = document.getElementById('header-subtitle');

  btn.disabled = true;
  btn.classList.add('spinning');
  bar.className = 'status-bar visible';
  bar.textContent = '⏳ 스프레드시트에서 최신 데이터를 불러오는 중...';

  try {
    const res = await fetch(CSV_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const parsed = csvToRecords(text);
    if (parsed.length === 0) throw new Error('데이터가 비어있습니다');

    RAW = parsed;
    const now = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
    sub.textContent = `마지막 업데이트: ${now}`;
    bar.className = 'status-bar';
    activeFilter = 'all';
    activeType = null;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
    render();
  } catch (e) {
    bar.className = 'status-bar error visible';
    bar.textContent = `⚠️ 데이터 로드 실패: ${e.message} — 기존 데이터를 표시합니다.`;
    render();
  } finally {
    btn.disabled = false;
    btn.classList.remove('spinning');
  }
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let activeFilter = 'all';
let activeType   = null;

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function filteredByGubun() {
  if (activeFilter === 'all') return RAW;
  return RAW.filter(r => r.gubun === activeFilter);
}

function finalFiltered() {
  let data = filteredByGubun();
  if (activeType) data = data.filter(r => r.type === activeType);
  return data;
}

function isCustomer(r) { return r.gubun.startsWith('고객'); }

// ═══════════════════════════════════════════════
//  RENDER: Summary cards
// ═══════════════════════════════════════════════
function renderSummary() {
  const base = filteredByGubun();
  const cust = base.filter(isCustomer).length;
  const sell = base.filter(r => !isCustomer(r)).length;
  document.getElementById('total-count').textContent    = base.length;
  document.getElementById('customer-count').textContent = cust;
  document.getElementById('seller-count').textContent   = sell;
}

// ═══════════════════════════════════════════════
//  RENDER: Type list (left panel)
// ═══════════════════════════════════════════════
function renderTypeList() {
  const base = filteredByGubun();
  const counts = {};
  base.forEach(r => { counts[r.type] = (counts[r.type] || 0) + 1; });
  const maxCount = Math.max(...Object.values(counts), 1);
  const types = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  document.getElementById('type-badge').textContent =
    activeFilter === 'all' ? '전체' : activeFilter;

  const container = document.getElementById('type-list');
  container.innerHTML = '';

  const allRow = document.createElement('div');
  allRow.className = 'type-row' + (activeType === null ? ' active' : '');
  allRow.innerHTML = `
    <div class="type-bar-wrap">
      <div class="type-name">📋 전체 보기</div>
      <div class="bar-track"><div class="bar-fill" style="width:100%"></div></div>
    </div>
    <div class="type-count">${base.length}</div>
  `;
  allRow.addEventListener('click', () => { activeType = null; render(); });
  container.appendChild(allRow);

  types.forEach(([type, count]) => {
    const pct = Math.round((count / maxCount) * 100);
    const row = document.createElement('div');
    row.className = 'type-row' + (activeType === type ? ' active' : '');
    row.innerHTML = `
      <div class="type-bar-wrap">
        <div class="type-name" title="${type}">${type}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="type-count">${count}</div>
    `;
    row.addEventListener('click', () => {
      activeType = (activeType === type) ? null : type;
      render();
    });
    container.appendChild(row);
  });
}

// ═══════════════════════════════════════════════
//  RENDER: VOC list (right panel)
// ═══════════════════════════════════════════════
function renderVocList() {
  const data = finalFiltered();
  const title = activeType
    ? activeType
    : (activeFilter === 'all' ? '전체 VOC 목록' : activeFilter + ' 목록');

  document.getElementById('voc-panel-title').textContent = title;
  document.getElementById('voc-panel-count').textContent = data.length + '건';

  const container = document.getElementById('voc-list');
  container.innerHTML = '';

  if (data.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>해당하는 VOC가 없습니다</p>
      </div>`;
    return;
  }

  data.forEach((r) => {
    const isCustomerItem = isCustomer(r);
    const tagClass = isCustomerItem ? 'tag-gubun-customer' : 'tag-gubun-seller';
    const cleanVoc = r.voc.replace(/<br\s*\/?>/gi, ' ').replace(/\s+/g, ' ').trim();

    const item = document.createElement('div');
    item.className = 'voc-item';
    item.innerHTML = `
      <div class="voc-meta">
        <span class="tag ${tagClass}">${r.gubun}</span>
        <span class="tag tag-date">${r.date}</span>
        <span class="tag">${r.type}</span>
        <span class="tag-num">#${r.num}</span>
      </div>
      <div class="voc-content">${cleanVoc}</div>
    `;
    item.addEventListener('click', () => item.classList.toggle('expanded'));
    container.appendChild(item);
  });
}

// ═══════════════════════════════════════════════
//  RENDER: All
// ═══════════════════════════════════════════════
function render() {
  renderSummary();
  renderTypeList();
  renderVocList();
}

// ═══════════════════════════════════════════════
//  EVENTS: Filter buttons
// ═══════════════════════════════════════════════
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    activeType = null;
    render();
  });
});

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
fetchData();
</script>
